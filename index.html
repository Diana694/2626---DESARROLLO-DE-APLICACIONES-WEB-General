<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panadería Aquí Me Voy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- INICIO: BLOQUE HEADER (Posteriormente header.html) -->
    <header class="sticky-top">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold text-warning" href="#">🍞 Panadería Aquí Me Voy</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto fw-medium">
                        <li class="nav-item"><a class="nav-link active" href="#inicio">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="#productos">Productos</a></li>
                        <li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <!-- FIN: BLOQUE HEADER -->

    <!-- INICIO: BLOQUE CONTENIDO PRINCIPAL (Posteriormente index.html con template blocks) -->
    <main>
        <section id="inicio" class="hero-section text-center text-md-start">
            <div class="container">
                <h1 class="display-4 fw-bold mb-3">Panadería Aquí Me Voy</h1>
                <p class="lead text-warning">El sabor tradicional en cada bocado.</p>
            </div>
        </section>

        <section id="contacto" class="container my-5">
            <h2 class="fw-bold mb-4">Registra tu Pedido Especial</h2>
            
            <div id="mensajeAlerta" class="mb-3"></div>

            <form id="formPedido" class="card card-custom p-4" novalidate>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nombre del Cliente *</label>
                        <input type="text" class="form-control" id="nombreCliente">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Tipo de Producto *</label>
                        <select class="form-select" id="tipoProducto">
                            <option value="">Seleccione...</option>
                            <option value="Panes de Dulce">Panes de Dulce 🍩</option>
                            <option value="Tortas Húmedas">Tortas Húmedas 🍰</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Detalles *</label>
                        <textarea class="form-control" id="detallesPedido" rows="3"></textarea>
                    </div>
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-warning">Registrar Pedido</button>
                    </div>
                </div>
            </form>

            <div class="mt-4">
                <div class="alert alert-info d-flex justify-content-between">
                    <span>📋 Listado de Pedidos</span>
                    <span>Total: <span id="totalRegistros" class="fw-bold">0</span></span>
                </div>
                <!-- CONTENIDO DINÁMICO RENDERIZADO POR JS -->
                <div id="listaRegistros" class="row g-3"></div>
            </div>
        </section>
    </main>
    <!-- FIN: BLOQUE CONTENIDO PRINCIPAL -->

    <!-- INICIO: BLOQUE FOOTER (Posteriormente footer.html) -->
    <footer class="bg-dark text-white pt-4 pb-3 mt-5">
        <div class="container text-center">
            <p>Elaborado por: <strong>Diana Susana Palma Cedeño</strong> | 2026</p>
        </div>
    </footer>
    <!-- FIN: BLOQUE FOOTER -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
